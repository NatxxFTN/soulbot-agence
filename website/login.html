<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soulbot — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Variables ─────────────────────────────────────────────── */
    :root {
      --primary: #FF0000;
      --neutral: #0A0A0A;
      --surface: #111111;
      --text-primary: #FFFFFF;
      --text-secondary: #AAAAAA;
      --text-tertiary: #666666;
      --text-muted: #555555;
      --border-subtle: #2A2A2A;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--text-primary);
      height: 100%;
      overflow: hidden;
      transition: opacity 0.6s ease;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── Animations ────────────────────────────────────────────── */
    @keyframes fadeRise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(30px, -20px) scale(1.05); }
      50%  { transform: translate(-20px, 30px) scale(0.95); }
      75%  { transform: translate(20px, 20px) scale(1.02); }
      100% { transform: translate(0, 0) scale(1); }
    }
    @keyframes dividerPulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    @keyframes pulseDot {
      from { transform: scale(0.8); opacity: 0.5; }
      to   { transform: scale(1.2); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    .logo-block     { animation: scaleIn 0.9s var(--ease-out-expo) forwards; animation-delay: 0.1s; opacity: 0; }
    .stats-block    { animation: fadeRise 0.8s var(--ease-out-expo) forwards; animation-delay: 0.4s; opacity: 0; }
    .quote-text     { animation: fadeIn 1.2s ease forwards; animation-delay: 0.8s; opacity: 0; }
    .right-panel    { animation: slideInRight 1s var(--ease-out-expo) forwards; animation-delay: 0.2s; opacity: 0; }
    .form-title     { animation: fadeRise 0.7s var(--ease-out-expo) forwards; animation-delay: 0.5s; opacity: 0; }
    .field-email    { animation: fadeRise 0.6s var(--ease-out-expo) forwards; animation-delay: 0.65s; opacity: 0; }
    .field-password { animation: fadeRise 0.6s var(--ease-out-expo) forwards; animation-delay: 0.8s; opacity: 0; }
    .form-footer    { animation: fadeRise 0.6s var(--ease-out-expo) forwards; animation-delay: 0.95s; opacity: 0; }
    .submit-btn     { animation: scaleIn 0.7s var(--ease-out-expo) forwards; animation-delay: 1.1s; opacity: 0; }
    .discord-btn    { animation: fadeIn 0.8s ease forwards; animation-delay: 1.3s; opacity: 0; }

    /* ─── Split Layout ──────────────────────────────────────────── */
    .split {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Left Panel ────────────────────────────────────────────── */
    .split-left {
      flex: 1;
      background: var(--neutral);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px;
      overflow: hidden;
    }

    /* ─── Orbs ──────────────────────────────────────────────────── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    .orb-1 {
      width: 300px; height: 300px;
      background: #FF0000;
      top: 20%; left: 10%;
      animation-duration: 12s;
    }
    .orb-2 {
      width: 200px; height: 200px;
      background: #CC0000;
      top: 60%; left: 40%;
      animation-duration: 18s;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 150px; height: 150px;
      background: #FF3333;
      top: 10%; left: 60%;
      animation-duration: 15s;
      animation-delay: -3s;
    }

    /* ─── Left Content ──────────────────────────────────────────── */
    .split-left .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .split-left .logo-square {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 4px;
      flex-shrink: 0;
    }
    .split-left .logo-text {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }
    .split-left .tagline {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-tertiary);
      letter-spacing: 0.03em;
    }

    /* ─── Left Stats ────────────────────────────────────────────── */
    .left-stats {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 36px;
    }
    .left-stat {
      text-align: center;
      padding: 0 24px;
    }
    .left-stat:not(:last-child) {
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .left-stat .num {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .left-stat .desc {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* ─── Left Quote ────────────────────────────────────────────── */
    .left-quote {
      position: absolute;
      bottom: 60px;
      font-size: 13px;
      font-style: italic;
      color: #444;
      letter-spacing: 0.02em;
    }

    .split-left .copyright {
      position: absolute;
      bottom: 24px;
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
      opacity: 0.6;
    }

    /* ─── Separator ─────────────────────────────────────────────── */
    .divider {
      width: 1px;
      height: 100vh;
      flex-shrink: 0;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255, 0, 0, 0.3) 30%,
        rgba(255, 0, 0, 0.6) 50%,
        rgba(255, 0, 0, 0.3) 70%,
        transparent 100%
      );
      animation: dividerPulse 3s ease-in-out infinite;
    }

    /* ─── Right Panel ───────────────────────────────────────────── */
    .split-right {
      flex: 1;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      position: relative;
    }
    .split-right .top-link {
      position: absolute;
      top: 28px;
      right: 36px;
      font-size: 13px;
      color: var(--text-tertiary);
      transition: color 0.25s ease;
    }
    .split-right .top-link:hover { color: var(--primary); }

    /* ─── Form Block ────────────────────────────────────────────── */
    .form-block {
      width: 100%;
      max-width: 420px;
    }
    .form-block h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
    }

    /* ─── Form ──────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 22px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .form-input:focus {
      border-bottom: 2px solid var(--primary);
    }
    .form-input::placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ─── Options ───────────────────────────────────────────────── */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 32px;
    }
    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .form-options input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .forgot-link {
      font-size: 13px;
      color: var(--text-tertiary);
      transition: color 0.25s ease, letter-spacing 0.3s ease;
    }
    .forgot-link:hover {
      color: var(--primary);
      letter-spacing: 0.02em;
    }

    /* ─── Submit Button ─────────────────────────────────────────── */
    .submit-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--text-primary);
      color: var(--neutral);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      transition: background 0.3s ease, transform 0.2s var(--ease-out-quart), box-shadow 0.3s ease;
    }
    .submit-btn:hover {
      background: var(--primary);
      color: var(--text-primary);
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    }
    .submit-btn:active {
      transform: scale(0.95);
    }
    .submit-btn .arrow {
      display: inline-block;
      line-height: 1;
    }

    /* ─── Loading dot ───────────────────────────────────────────── */
    .loading-dot {
      display: block;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      margin: auto;
      animation: pulseDot 0.6s ease infinite alternate;
    }

    /* ─── Discord Pill ──────────────────────────────────────────── */
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      transition: border-color 0.3s ease, background 0.3s ease, transform 0.2s ease;
      cursor: pointer;
    }
    .discord-btn:hover {
      border-color: var(--primary);
      background: rgba(255, 0, 0, 0.05);
      transform: translateY(-2px);
    }
    .discord-btn svg {
      width: 18px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ─── Custom Cursor ─────────────────────────────────────────── */
    * { cursor: none; }
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(255, 0, 0, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.4s var(--ease-out-expo), width 0.3s ease, height 0.3s ease;
    }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .split { flex-direction: column; }
      .divider { width: 100%; height: 1px; }
      .split-left { flex: 0 0 220px; padding: 24px; }
      .split-left .logo-text { font-size: 32px; }
      .split-left .logo-square { width: 32px; height: 32px; }
      .left-stat:not(:last-child) { border-right: none; }
      .left-quote { bottom: 44px; }
      .split-right { padding: 32px 24px; overflow-y: auto; }
      .form-block h1 { font-size: 28px; }
      .split-right .top-link { top: 16px; right: 20px; }
      * { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="split">

    <!-- ════════════════════════════════════════════ -->
    <!-- LEFT PANEL                                    -->
    <!-- ════════════════════════════════════════════════ -->
    <div class="split-left">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>

      <div class="logo-block logo">
        <div class="logo-square"></div>
        <span class="logo-text">Soulbot</span>
      </div>
      <p class="tagline stats-block">Bot Discord Premium</p>

      <div class="stats-block left-stats">
        <div class="left-stat">
          <div class="num">300+</div>
          <div class="desc">Commandes</div>
        </div>
        <div class="left-stat">
          <div class="num">27</div>
          <div class="desc">Events logués</div>
        </div>
        <div class="left-stat">
          <div class="num">100%</div>
          <div class="desc">Premium</div>
        </div>
      </div>

      <p class="quote-text left-quote">"Le bot qui a tout. Vraiment tout."</p>
      <div class="copyright">© 2026 Soulbot. All rights reserved.</div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- SEPARATOR                                    -->
    <!-- ════════════════════════════════════════════════ -->
    <div class="divider"></div>

    <!-- ════════════════════════════════════════════ -->
    <!-- RIGHT PANEL                                   -->
    <!-- ════════════════════════════════════════════════ -->
    <div class="split-right right-panel">
      <a href="index.html" class="top-link">
        ← Créer un compte
      </a>

      <div class="form-block">
        <h1 class="form-title">Connexion</h1>

        <form id="loginForm" novalidate>
          <div class="form-group field-email">
            <label for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="vous@exemple.com" autocomplete="email">
          </div>
          <div class="form-group field-password">
            <label for="password">Mot de passe</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="form-footer form-options">
            <label>
              <input type="checkbox" checked> Se souvenir de moi
            </label>
            <a href="#" class="forgot-link">Mot de passe oublié ?</a>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn" aria-label="Se connecter">
            <span class="arrow">→</span>
          </button>
        </form>

        <a href="#" class="discord-btn">
          <svg viewBox="0 0 127 96" fill="currentColor"><path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 0 10.89-5.29 67.01 67.01 0 0 0-5.38-8.21 95.55 95.55 0 0 0 34.85 0 66.56 66.56 0 0 0-5.38 8.21 68.37 68.37 0 0 0 10.89 5.29 77.64 77.64 0 0 0 6.89 11.11 105.83 105.83 0 0 0 32.17-16.15c2.64-27.38-4.45-51.11-18.9-72.14ZM42.68 65.69c-3.56 0-6.48-3.28-6.48-7.28s2.87-7.29 6.48-7.29c3.61 0 6.52 3.28 6.48 7.29 0 4-2.86 7.28-6.48 7.28Zm36.73 0c-3.57 0-6.48-3.28-6.48-7.28s2.87-7.29 6.48-7.29c3.61 0 6.53 3.28 6.48 7.29 0 4-2.87 7.28-6.48 7.28Z"/></svg>
          Se connecter avec Discord
        </a>
      </div>
    </div>
  </div>

  <script>
    // ─── Custom Cursor ──────────────────────────────────────────────
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX - 4 + 'px';
      cursor.style.top = e.clientY - 4 + 'px';
      ring.style.left = e.clientX - 16 + 'px';
      ring.style.top = e.clientY - 16 + 'px';
    });

    document.querySelectorAll('a, button, input, .submit-btn').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring.style.width = '48px';
        ring.style.height = '48px';
        const left = parseFloat(ring.style.left) || 0;
        const top = parseFloat(ring.style.top) || 0;
        ring.style.left = left - 8 + 'px';
        ring.style.top = top - 8 + 'px';
      });
      el.addEventListener('mouseleave', () => {
        ring.style.width = '32px';
        ring.style.height = '32px';
      });
    });

    // ─── Form Submit ────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');

      if (!email || !password) {
        const formBlock = document.querySelector('.form-block');
        formBlock.style.animation = 'shake 0.3s ease';
        setTimeout(() => { formBlock.style.animation = ''; }, 300);
        return;
      }

      // Phase 1: loading dot
      btn.innerHTML = '<span class="loading-dot"></span>';
      btn.style.background = '#FF0000';

      // Phase 2: checkmark
      setTimeout(() => {
        btn.innerHTML = '✓';
        btn.style.transform = 'scale(1.1)';

        // Phase 3: fade out page
        setTimeout(() => {
          document.body.style.opacity = '0';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 600);
        }, 400);
      }, 800);
    });
  </script>
</body>
</html>
